<svg xmlns="http://www.w3.org/2000/svg" width="330" height="200" viewBox="0 0 330 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0137d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#800080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="330" height="200" fill="url(#bg)" rx="6" />

  <!-- Decorative circles -->
  <circle cx="300" cy="40" r="70" fill="#ffffff" opacity="0.04" />
  <circle cx="300" cy="40" r="45" fill="#ffffff" opacity="0.05" />
  <circle cx="30" cy="185" r="55" fill="#ffffff" opacity="0.04" />

  <!-- Main headline -->
  <text x="165" y="92" font-family="Josefin Sans, sans-serif" font-size="28"
        font-weight="700" fill="#ffffff" letter-spacing="0.5"
        text-anchor="middle">Apps &amp; Dashboards</text>

  <!-- Divider -->
  <rect x="115" y="103" width="100" height="2" fill="#ffffff" opacity="0.4" rx="1" />

  <!-- Subtitle -->
  <text x="165" y="130" font-family="Josefin Sans, sans-serif" font-size="15"
        font-weight="400" fill="#ffffff" opacity="0.9" letter-spacing="1"
        text-anchor="middle">Software-Entwicklung</text>

  <!-- CTA button -->
  <rect x="75" y="153" width="180" height="34" fill="#ffffff" opacity="0.15" rx="4" />
  <rect x="75" y="153" width="180" height="34" fill="none" stroke="#ffffff"
        stroke-width="1.5" rx="4" opacity="0.6" />
  <text x="165" y="175" font-family="Josefin Sans, sans-serif" font-size="12"
        font-weight="600" fill="#ffffff" letter-spacing="1.5"
        text-anchor="middle">fruchthandel-apps.de →</text>
</svg>
